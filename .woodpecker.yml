when:
  - event: push
    branch: main
  - event: pull_request
  - event: manual

steps:
  - name: build
    image: localhost:5000/rust-builder:1.92.0-ci
    environment:
      CARGO_INCREMENTAL: "0"
      TMPDIR: /tmp
    volumes:
      - /var/cache/sccache:/root/.cache/sccache
      - /var/cache/cargo:/usr/local/cargo/registry
    commands:
      - cargo build --release

  - name: test
    image: localhost:5000/rust-builder:1.92.0-ci
    when:
      - event: [pull_request, manual]
    environment:
      CARGO_INCREMENTAL: "0"
      TMPDIR: /tmp
    volumes:
      - /var/cache/sccache:/root/.cache/sccache
      - /var/cache/cargo:/usr/local/cargo/registry
    commands:
      - cargo test --workspace --release

  - name: radicle-sync
    image: curlimages/curl:latest
    when:
      - event: push
        branch: main
    commands:
      - curl -sfX POST "http://source.ac-dc.network:8766/push/actus"
